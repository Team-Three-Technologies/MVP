<div class="container">
    <h2>Documenti</h2>
    
    <div class="form">
        <input [(ngModel)]="newTitle" placeholder="Titolo" />
        <textarea [(ngModel)]="newContent" placeholder="Contenuto" rows="3"></textarea>
        <button (click)="create()" [disabled]="!newTitle.trim()">
            Salva
        </button>
    </div>

    <p class="error" *ngIf="error">{{ error }}</p>

    <ul *ngIf="documents.length > 0">
        <li *ngFor="let doc of documents">
            <div class="doc-info">
                <strong>{{ doc.title }}</strong>
                <span>{{ doc.updatedAt | date:'short' }}</span>
            </div>
            <p>{{ doc.content }}</p>
            <button (click)="remove(doc.id)">Elimina</button>
        </li>
    </ul>

    <p *ngIf="documents.length === 0 && !error">
        Nessun documento.
    </p>
</div>
