<div class="document-list-panel">

  @if (isLoading) {
    <p>Loading...</p>
  } @else if (errorMessage) {
  <p class="error">{{ errorMessage }}</p>
} @else {

  <ul role="list">
    @for (doc of documents; track doc.uuid_documento) {
      <li>
        <button type="button" (click)="onRowClick(doc.uuid_documento)">
          <span>{{ doc.nome_documento }}</span>
          <span>{{ doc.formato }}</span>
          <span>{{ doc.uuid_documento }}</span>
          <span>{{ doc.data_registrazione }} {{ doc.ora_registrazione }}</span>
        </button>
      </li>
    }
    @empty {
      <li>Nessun documento corrispondente alla ricerca.</li>
    }
  </ul>
}
</div>
