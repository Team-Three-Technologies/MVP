<div class="preview-card">
  <div class="card-header">
    <h3>Anteprima Documento</h3>
    @if (document) {
      <span class="doc-name">{{ document.nome_documento }}</span>
    }
  </div>

  <div class="card-body">
    @if (safeUrl) {
      <iframe [src]="safeUrl" width="100%" height="600px" style="border: none;"></iframe>
    } @else if (document) {
      <div class="loading-state">
        <p>Caricamento anteprima in corso...</p>
      </div>
    } @else {
      <div class="empty-state">
        <p>Seleziona un documento dalla lista per visualizzarne l'anteprima.</p>
      </div>
    }
  </div>
</div>
